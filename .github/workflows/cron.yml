name: Trigger Vercel Auto-Publisher

on:
  schedule:
    # Runs every 30 minutes
    - cron: '*/30 * * * *'
  # Also allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Vercel Cron API
        # Replace the URL below with your actual Vercel production URL!
        run: curl -X GET "${{ secrets.CRON_URL }}"
